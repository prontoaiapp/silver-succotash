<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProntoAí</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#F5F7FA;
    text-align:center;
}

.hero{
    padding:80px 20px;
}

h1{
    font-size:48px;
    font-weight:800;
    color:#0A1020;
}

.gradient{
    background:linear-gradient(90deg,#2F6BFF,#58D26A);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    font-size:22px;
    color:#666;
    max-width:700px;
    margin:auto;
}

button{
    margin-top:40px;
    padding:20px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#2F6BFF,#58D26A);
    color:white;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">

<h1>
O futuro da contratação de
<span class="gradient">serviços</span>
começa agora.
</h1>

<p>
Clientes encontram profissionais.
Profissionais encontram oportunidades.
Tudo em um único aplicativo.
</p>

<button>
Entrar na lista de espera
</button>

</section>

</body>
</html>
